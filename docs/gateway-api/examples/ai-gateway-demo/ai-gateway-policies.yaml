---
# ai-gateway-policies.yaml
#
# Demo policies for the AKO AI Gateway — both applied to the same HTTPRoute
# (llm-route) so you can layer them independently.
#
# Part A — token rate limiting only (no Avi pre-setup needed):
#   kubectl apply -f ai-gateway-policies.yaml -l demo-part=token-limits
#
# Part B — add JWT auth on top (requires setup.sh to have created the Avi SSO Policy):
#   kubectl apply -f ai-gateway-policies.yaml


# ─── Part A: Token rate limiting ─────────────────────────────────────────────
apiVersion: ai.ako.vmware.com/v1alpha1
kind: AITokenRateLimitPolicy
metadata:
  name: llm-limits
  namespace: inference
  labels:
    demo-part: token-limits
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: llm-route

  # Identity resolution: use x-ai-consumer header (set by AIGatewayAuthPolicy
  # when JWT auth is enabled), falling back to source IP for the Part-A demo.
  identitySource:
    header: x-ai-consumer
    fallback: clientIP   # change to "reject" to require the header

  limits:
  # Tight budget for demo — 500 total tokens per consumer per hour.
  # Each mock response uses 100 tokens, so the 6th request is rejected.
  - name: hourly-consumer-tokens
    key: consumer          # keyed on x-ai-consumer header (or clientIP fallback)
    tokens: total
    budget: 500
    window: 1h
    action:
      type: Reject
      statusCode: 429
      retryAfter: true     # adds Retry-After header pointing at window boundary

  # A looser daily cap to show multiple limits can stack.
  - name: daily-consumer-tokens
    key: consumer
    tokens: total
    budget: 5000
    window: 24h
    action:
      type: Reject
      statusCode: 429

  # Optional: soft RPS throttle (per-SE token bucket, Phase 1).
  # Uncomment to demo requests getting dropped at >5 RPS from the same IP.
  # requestRateLimit:
  #   requestsPerSecond: 5
  #   burst: 10
  #   key: clientIP


# ─── Part B: JWT authentication ──────────────────────────────────────────────
# Requires:
#   1. setup.sh has run and created the Avi JWTServerProfile + SSO Policy.
#   2. The SSO Policy is named exactly "inference-llm-auth-sso" in Avi
#      (AKO derives: <namespace>-<policy-name>-sso = inference-llm-auth-sso).
---
apiVersion: ai.ako.vmware.com/v1alpha1
kind: AIGatewayAuthPolicy
metadata:
  name: llm-auth
  namespace: inference
  labels:
    demo-part: jwt-auth
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: llm-route

  jwt:
    # Must match the "issuer" value in the Avi JWTServerProfile.
    # setup.sh sets this to the jwt-issuer LoadBalancer IP.
    issuer: "http://REPLACE_WITH_ISSUER_VIP:8080"
    audiences:
    - llm-api
    identityClaim: sub         # becomes the x-ai-consumer header value
    forwardClaims:
    - tenant                   # forwarded as "tenant" request header
    - model                    # forwarded as "model" request header

  identityHeader: x-ai-consumer  # matches AITokenRateLimitPolicy.identitySource.header
  onFailure:
    statusCode: 401
