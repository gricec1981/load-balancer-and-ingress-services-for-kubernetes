---
apiVersion: v1
kind: Service
metadata:
  name: vllm-pod-1
  namespace: inference
spec:
  selector:
    app: vllm
    pod: "1"
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-pod-2
  namespace: inference
spec:
  selector:
    app: vllm
    pod: "2"
  ports:
  - port: 8000
    targetPort: 8000
