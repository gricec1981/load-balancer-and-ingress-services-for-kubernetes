---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aigatewayauthpolicies.ai.ako.vmware.com
spec:
  group: ai.ako.vmware.com
  names:
    kind: AIGatewayAuthPolicy
    listKind: AIGatewayAuthPolicyList
    plural: aigatewayauthpolicies
    singular: aigatewayauthpolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        description: |-
          AIGatewayAuthPolicy authenticates API consumers via JWT and resolves a
          stable consumer identity that downstream rate-limiting and observability
          policies key off. Phase 1 supports JWT only; mTLS and OIDC are Phase 2.
        type: object
        required:
        - spec
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired authentication configuration.
            type: object
            required:
            - targetRef
            - jwt
            properties:
              targetRef:
                description: |-
                  targetRef identifies the HTTPRoute (or Gateway) this policy applies to.
                  Consistent with the Gateway API policy-attachment convention.
                type: object
                required:
                - group
                - kind
                - name
                properties:
                  group:
                    description: API group of the referent (e.g. gateway.networking.k8s.io).
                    type: string
                  kind:
                    description: Kind of the referent (HTTPRoute or Gateway).
                    type: string
                    enum:
                    - HTTPRoute
                    - Gateway
                  name:
                    description: Name of the referent in the same namespace.
                    type: string
              jwt:
                description: jwt configures JWT validation for this route.
                type: object
                required:
                - issuer
                properties:
                  issuer:
                    description: Issuer is the expected `iss` claim value.
                    type: string
                  jwksUri:
                    description: |-
                      jwksUri is the URL of the JWKS endpoint. AKO fetches and caches the
                      key set for signature verification.
                    type: string
                  audiences:
                    description: |-
                      audiences lists acceptable `aud` claim values. At least one must match.
                      If empty, audience validation is skipped.
                    type: array
                    items:
                      type: string
                  identityClaim:
                    description: |-
                      identityClaim is the JWT claim whose value becomes the consumer identity
                      written into identityHeader. Defaults to "sub".
                    type: string
                    default: sub
                  forwardClaims:
                    description: |-
                      forwardClaims is the list of additional JWT claims to inject as
                      request headers (header name = claim name, lower-cased).
                    type: array
                    items:
                      type: string
              identityHeader:
                description: |-
                  identityHeader is the name of the request header that receives the
                  resolved consumer identity after successful JWT validation.
                  Defaults to "x-ai-consumer".
                type: string
                default: x-ai-consumer
              onFailure:
                description: onFailure controls the response when JWT validation fails.
                type: object
                properties:
                  statusCode:
                    description: HTTP status code to return on auth failure. Defaults to 401.
                    type: integer
                    default: 401
                    minimum: 400
                    maximum: 599
          status:
            description: Status reflects the observed state of the policy.
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
    additionalPrinterColumns:
    - name: Target
      type: string
      jsonPath: .spec.targetRef.name
    - name: Issuer
      type: string
      jsonPath: .spec.jwt.issuer
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
